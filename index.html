<!--
==========================================
實驗紀錄系統 - 前端網頁 (旗艦功能版)
版本：v2.7 (完美對接 D 欄總分累加機制、4K畫質、全螢幕修復)
功能：
1. 實物投影機視訊 (支援全螢幕、左右互換、收納功能，強制4K畫質)
2. UI 彈性控制：字體大小、表格比例、首欄寬度調整
3. 實驗表格精確對齊 Word 圖片需求 (含填空題)
4. 評分預選機制：先選分數再儲存，並即時顯示 D 欄累計總分
==========================================
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子電路實驗紀錄系統 v2.7</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .transition-layout { transition: all 0.3s ease-in-out; }
        
        :root {
            --table-width: 100%;
            --font-size: 14px;
            --col1-width: 140px; 
        }

        #table-container table { 
            width: var(--table-width); 
            font-size: var(--font-size); 
            margin: 0 auto; 
            table-layout: fixed;
        }

        #table-container th:first-child, #table-container td:first-child { 
            width: var(--col1-width); word-break: break-all;
        }
        
        .student-item { transition: background-color 0.2s; border-radius: 8px; }
        .student-item:hover { background-color: #f3f4f6; cursor: pointer; }
        .student-item.selected { background-color: #ebf5ff; border: 2px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; text-align: center; background: transparent; outline: none; border-bottom: 1px solid #e5e7eb; }
        .table-input:focus { border-bottom: 2px solid #3b82f6; }
        .fill-blank { border-bottom: 1px solid #4b5563; width: 45px; text-align: center; outline: none; background: transparent; }

        /* 評分按鈕樣式 */
        .score-pill { 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; border: 1px solid #d1d5db; font-weight: bold; cursor: pointer; transition: all 0.1s;
        }
        .score-pill:hover { background-color: #f3f4f6; }
        .score-pill.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .sign-btn { 
            padding: 4px 12px; border-radius: 6px; border: 1px solid #d1d5db; cursor: pointer; font-weight: bold;
        }
        .sign-btn.active-plus { background-color: #10b981; color: white; border-color: #10b981; }
        .sign-btn.active-minus { background-color: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-layout">
    
    <!-- 視訊顯示區 -->
    <div id="videoContainer" class="relative bg-black flex flex-col items-center justify-center p-2 flex-1 h-full min-w-0 transition-layout">
        
        <!-- 左上角常駐控制列 (包含全螢幕) -->
        <div class="absolute top-4 left-4 z-10 bg-white/90 p-2 rounded-lg shadow flex items-center gap-2">
            <select id="cameraSelect" class="border rounded p-1 text-sm outline-none max-w-[120px]"></select>
            <button id="refreshCamBtn" class="bg-blue-100 hover:bg-blue-200 p-1.5 rounded" title="重新偵測"><svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded" title="左右互換"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="fullscreenBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded" title="全螢幕模式"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
        </div>
        
        <button id="toggleSidebarBtn" class="absolute top-4 right-4 z-30 bg-blue-600 text-white p-2.5 rounded-full shadow-2xl hover:bg-blue-700 transform active:scale-95 transition-all">
            <svg id="sidebar-icon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
        </button>

        <video id="video" class="w-full h-full object-contain bg-gray-900 rounded" autoplay playsinline></video>
        <div id="noCameraMsg" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-900/80">偵測不到攝影機</div>
    </div>

    <!-- 紀錄面板側邊欄 -->
    <div id="sidebar" class="w-full md:w-[450px] bg-white flex flex-col shadow-2xl z-20 h-1/2 md:h-full transition-layout overflow-hidden shrink-0">
        
        <div class="p-4 bg-blue-50 border-b border-blue-100 shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-bold text-blue-900">實驗紀錄單 <span class="text-xs font-normal text-blue-600 bg-white px-1 border rounded ml-1">v2.7</span></h1>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <select id="gradeSelect" class="border rounded p-1.5 text-sm outline-none"><option value="7">七年級</option><option value="8" selected>八年級</option><option value="9">九年級</option></select>
                <select id="classSelect" class="border rounded p-1.5 text-sm outline-none"></select>
            </div>
            
            <select id="expSelect" class="w-full border rounded p-1.5 font-bold text-blue-800 text-sm mb-2">
                <option value="exp1">1. 固定電阻 (1000Ω)</option>
                <option value="exp2">2. 電阻串聯 (固定 3V)</option>
                <option value="exp3">3. 電阻並聯 (固定 3V)</option>
                <option value="exp4">4. 並聯迴路觀察</option>
            </select>

            <div class="bg-white/50 p-2 rounded border border-blue-100 flex gap-4">
                <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold flex-1">
                    文字：<input type="range" id="fontSlider" min="10" max="22" value="14" class="flex-1 h-1 bg-blue-200 rounded appearance-none">
                </div>
                <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold flex-1">
                    首欄：<input type="range" id="colWidthSlider" min="50" max="200" value="140" class="flex-1 h-1 bg-blue-200 rounded appearance-none">
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto bg-gray-50 p-4 space-y-4 no-scrollbar">
            <!-- 表格容器 -->
            <div id="table-container" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 overflow-x-auto min-h-[100px]"></div>
            
            <!-- 學生評分區 -->
            <div id="gradingPanel" class="hidden bg-blue-50 border-2 border-blue-200 p-4 rounded-xl shadow-inner animate-pulse-slow">
                <div class="flex items-center justify-between mb-3">
                    <span id="selectedStudentName" class="font-black text-blue-800 text-lg">選擇學生</span>
                    <button onclick="closeGrading()" class="text-gray-400 hover:text-red-500 text-xl font-bold">✕</button>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex gap-3 justify-center">
                        <button id="signPlus" class="sign-btn active-plus text-sm">加分 (+)</button>
                        <button id="signMinus" class="sign-btn text-sm">扣分 (-)</button>
                    </div>
                    <div class="flex gap-2 justify-center">
                        <button class="score-pill score-val active" data-val="1">1</button>
                        <button class="score-pill score-val" data-val="2">2</button>
                        <button class="score-pill score-val" data-val="3">3</button>
                        <button class="score-pill score-val" data-val="4">4</button>
                        <button class="score-pill score-val" data-val="5">5</button>
                    </div>
                    <button id="confirmScoreBtn" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg shadow-lg hover:bg-blue-700 transition-all active:scale-95">確認紀錄</button>
                </div>
            </div>

            <!-- 名單容器 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-100 px-4 py-2 border-b flex justify-between items-center text-sm font-bold">
                    <span>名單 (點擊可評分)</span>
                    <span id="studentCount" class="text-xs font-mono bg-gray-200 px-2 py-0.5 rounded text-gray-600">--</span>
                </div>
                <div id="student-list" class="divide-y divide-gray-100 max-h-[400px] overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <div class="p-4 bg-white border-t shrink-0 flex flex-col gap-2">
            <button id="calcBtn" class="w-full bg-green-500 text-white font-bold py-2 rounded text-sm shadow hover:bg-green-600 active:scale-95">自動計算 (V/I) × 1000</button>
            <div class="flex gap-2">
                <button id="loadBtn" class="flex-1 bg-amber-500 text-white font-bold py-2 rounded text-xs shadow hover:bg-amber-600">提取紀錄</button>
                <button id="clearBtn" class="flex-1 bg-red-500 text-white font-bold py-2 rounded text-xs shadow hover:bg-red-600">清除紀錄</button>
                <button id="saveBtn" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded text-xs shadow hover:bg-blue-700">儲存數據</button>
            </div>
        </div>
    </div>
</div>

<div id="customModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 hidden p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 transform scale-95 transition-transform">
        <h3 id="modalTitle" class="text-lg font-bold mb-3 border-b pb-2">提示</h3>
        <p id="modalMessage" class="text-gray-600 mb-6 text-sm whitespace-pre-wrap"></p>
        <button id="modalCloseBtn" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow">確認</button>
    </div>
</div>

<script>
    // ⚠️ 替換成您最新的 GAS 網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzGj5KcJxD9iXeR5jiQEe_g9FhK5eYF3UFpyqPaQzxm5Fcns5-KdcOCGUYbbZw6AQ0g/exec'; 

    const classSelect = document.getElementById('classSelect');
    for (let i = 1; i <= 17; i++) {
        let val = i < 10 ? '0' + i : i;
        classSelect.innerHTML += `<option value="${val}">${val} 班</option>`;
    }

    const mainContainer = document.getElementById('mainContainer');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebarIcon = document.getElementById('sidebar-icon');
    let isSidebarOpen = true;

    function updateLayout() {
        if (!isSidebarOpen) { sidebar.style.width = '0px'; sidebar.style.minWidth = '0px'; sidebarIcon.style.transform = 'rotate(180deg)'; }
        else { const isMobile = window.innerWidth < 768; sidebar.style.width = isMobile ? '100%' : '450px'; sidebar.style.minWidth = isMobile ? '100%' : '450px'; sidebarIcon.style.transform = 'rotate(0deg)'; }
    }
    toggleSidebarBtn.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; updateLayout(); });
    window.addEventListener('resize', updateLayout);

    const fontSlider = document.getElementById('fontSlider');
    const colWidthSlider = document.getElementById('colWidthSlider');
    fontSlider.addEventListener('input', () => document.documentElement.style.setProperty('--font-size', fontSlider.value + 'px'));
    colWidthSlider.addEventListener('input', () => document.documentElement.style.setProperty('--col1-width', colWidthSlider.value + 'px'));

    function showModal(title, message) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        document.getElementById('customModal').classList.remove('hidden');
    }
    document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('customModal').classList.add('hidden'));

    // --- 相機控制 (強制 4K 畫質) ---
    const video = document.getElementById('video');
    const cameraSelect = document.getElementById('cameraSelect');
    async function initCamera() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';
            videoDevices.forEach((d, i) => cameraSelect.innerHTML += `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`);
            startStream();
        } catch (e) { document.getElementById('noCameraMsg').classList.remove('hidden'); }
    }
    async function startStream() {
        if (!cameraSelect.value) return;
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cameraSelect.value }, width: { ideal: 3840 }, height: { ideal: 2160 } } });
            video.srcObject = s;
        } catch (err) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cameraSelect.value } } });
                video.srcObject = s;
            } catch (e) {}
        }
    }
    cameraSelect.addEventListener('change', startStream);
    document.getElementById('refreshCamBtn').addEventListener('click', initCamera);

    // --- 實驗表格渲染 ---
    function renderTable() {
        const val = document.getElementById('expSelect').value;
        const container = document.getElementById('table-container');
        let html = '';
        
        if (val === 'exp1') {
            html = `
                <h3 class="font-bold text-center text-blue-900 mb-2 border-b">1. 固定電阻 (1000Ω 棕黑紅金)</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-blue-50 border"><th class="border">電壓</th><th class="border">實際電壓(V)</th><th class="border">電流(mA)</th><th class="border">比值(Ω)</th></tr></thead>
                    <tbody>
                        <tr><td class="border bg-gray-50">1.5V</td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border bg-gray-50">3V</td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border bg-gray-50">4.5V</td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                    </tbody>
                </table>
                <div class="mt-3 text-[var(--font-size)] space-y-1 text-gray-700">
                    <p>a. 電壓除以電流是否是一個定值？ <input type="text" class="fill-blank"> 意義： <input type="text" class="fill-blank w-[120px]"></p>
                    <p>b. 電壓變 <input type="text" class="fill-blank w-8">，電流變 <input type="text" class="fill-blank w-8">，成 <input type="text" class="fill-blank w-8"> 比</p>
                </div>`;
        } else if (val === 'exp2' || val === 'exp3') {
            const sym = val === 'exp2' ? '+' : '//';
            const title = val === 'exp2' ? '實驗二：電阻串聯 (固定 3V)' : '實驗三：電阻並聯 (固定 3V)';
            html = `
                <h3 class="font-bold text-center text-blue-900 mb-2 border-b">${title}</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-blue-50 border text-[0.8em]"><th class="border">電阻組合</th><th class="border">三用電表(Ω)</th><th class="border">電壓(V)</th><th class="border">電流(mA)</th><th class="border">比值(Ω)</th></tr></thead>
                    <tbody>
                        <tr><td class="border px-1">1個：<input type="text" class="fill-blank w-10" value="1K"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border px-1">2個：<input type="text" class="fill-blank w-8" value="1K">${sym}<input type="text" class="fill-blank w-8" value="1K"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border px-1">3個：<input type="text" class="fill-blank w-6" value="1K">${sym}<input type="text" class="fill-blank w-6" value="1K">${sym}<input type="text" class="fill-blank w-6" value="1K"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                    </tbody>
                </table>
                <div class="mt-3 text-[var(--font-size)]">結論：<input type="text" class="fill-blank w-full"></div>`;
        } else if (val === 'exp4') {
            html = `
                <h3 class="font-bold text-center text-green-700 mb-2 border-b">4. 並聯兩個電阻觀察迴路</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-green-50 border"><th class="border">電阻</th><th class="border">電阻(Ω)</th><th class="border">電壓(V)</th><th class="border">電流(mA)</th></tr></thead>
                    <tbody>
                        <tr><td class="border font-bold bg-gray-50">迴路 1</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                        <tr><td class="border font-bold bg-gray-50">迴路 2</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                        <tr><td class="border font-bold bg-gray-50 italic">總</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                    </tbody>
                </table>
                <div class="mt-4 text-[var(--font-size)] space-y-1.5 text-gray-800">
                    <p>A: 電阻比：迴路1:迴路2 = <input type="text" class="fill-blank w-12"> : <input type="text" class="fill-blank w-12"></p>
                    <p>B: 電流比：迴路1:迴路2 = <input type="text" class="fill-blank w-12"> : <input type="text" class="fill-blank w-12"></p>
                    <p>C: 結論：<input type="text" class="fill-blank w-full"></p>
                </div>`;
        }
        container.innerHTML = html;
        executeLoad(true);
    }

    // --- 評分邏輯 ---
    let currentStudent = null;
    let scoreSign = 1; // 1: 加, -1: 扣
    let scoreVal = 1;

    function openGrading(s) {
        currentStudent = s;
        document.getElementById('selectedStudentName').textContent = `[No.${s.no}] ${s.name}`;
        document.getElementById('gradingPanel').classList.remove('hidden');
        document.querySelectorAll('.student-item').forEach(el => el.classList.remove('selected'));
        document.querySelector(`.student-item[data-row="${s.row}"]`).classList.add('selected');
    }

    function closeGrading() {
        document.getElementById('gradingPanel').classList.add('hidden');
        document.querySelectorAll('.student-item').forEach(el => el.classList.remove('selected'));
        currentStudent = null;
    }

    document.getElementById('signPlus').addEventListener('click', () => {
        scoreSign = 1; document.getElementById('signPlus').classList.add('active-plus'); document.getElementById('signMinus').classList.remove('active-minus');
    });
    document.getElementById('signMinus').addEventListener('click', () => {
        scoreSign = -1; document.getElementById('signMinus').classList.add('active-minus'); document.getElementById('signPlus').classList.remove('active-plus');
    });

    document.querySelectorAll('.score-val').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.score-val').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            scoreVal = parseInt(btn.dataset.val);
        });
    });

    document.getElementById('confirmScoreBtn').addEventListener('click', async () => {
        if (!currentStudent) return;
        const amount = scoreSign * scoreVal;
        const btn = document.getElementById('confirmScoreBtn');
        btn.disabled = true; btn.textContent = '雲端紀錄中...';
        
        const r = await apiCall({ action: 'updateScore', studentRow: currentStudent.row, amount: amount });
        if (r.status === 'success') {
            const disp = document.querySelector(`.score-display[data-row="${currentStudent.row}"]`);
            if (disp) disp.textContent = r.newVal + ' 分';
            
            const eff = document.createElement('div'); eff.textContent = (amount > 0 ? '+' : '') + amount;
            eff.className = `absolute right-24 top-2 font-black text-xl pointer-events-none animate-bounce ${amount > 0 ? 'text-green-500' : 'text-red-500'}`;
            document.querySelector(`.student-item[data-row="${currentStudent.row}"]`).appendChild(eff);
            setTimeout(() => { eff.remove(); closeGrading(); }, 800);
        } else {
            showModal('錯誤', '分數儲存失敗，請檢查網路連線。');
        }
        btn.disabled = false; btn.textContent = '確認紀錄';
    });

    // --- 數據通訊 ---
    async function apiCall(p) {
        try { const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(p) }); return await r.json(); }
        catch (e) { return { status: 'error' }; }
    }

    async function loadStudents() {
        const list = document.getElementById('student-list');
        list.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">載入名單中...</div>';
        const r = await apiCall({ action: 'getStudents', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value });
        if (r.status === 'success' && r.data.length > 0) {
            document.getElementById('studentCount').textContent = r.data.length + '人';
            list.innerHTML = '';
            r.data.forEach(s => {
                const item = document.createElement('div');
                item.className = "student-item flex items-center justify-between px-4 py-3 relative border-b border-gray-100";
                item.dataset.row = s.row;
                item.onclick = () => openGrading(s);
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs">${s.no}</span>
                        <span class="font-bold text-gray-800 text-base">${s.name}</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] text-gray-400 font-bold uppercase leading-none mb-1">總分</span>
                        <span class="text-sm font-black px-2 py-0.5 bg-amber-100 text-amber-700 rounded-md score-display" data-row="${s.row}">${s.score} 分</span>
                    </div>`;
                list.appendChild(item);
            });
        } else { list.innerHTML = '<div class="p-8 text-center text-gray-400 italic">尚未查到該班級資料</div>'; }
    }

    function calculateRatio() {
        document.querySelectorAll('#table-container tr').forEach(row => {
            const vIn = row.querySelector('.input-v');
            const iIn = row.querySelector('.input-i');
            const v = vIn ? parseFloat(vIn.value) : parseFloat(row.cells[0]?.innerText.replace('V',''));
            const i = iIn ? parseFloat(iIn.value) : null;
            const res = row.querySelector('.result-r');
            if (res) res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-';
        });
    }

    async function executeLoad(isSilent) {
        const p = { action: 'load', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value, expType: document.getElementById('expSelect').value };
        const r = await apiCall(p);
        if (r.status === 'success') {
            const ins = document.querySelectorAll('#table-container input');
            ins.forEach((input, idx) => { if (r.data[idx] !== undefined) input.value = r.data[idx]; });
            calculateRatio();
        } else { document.querySelectorAll('#table-container input').forEach(input => input.value = ''); }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value);
        const res = await apiCall({ action: 'save', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value, expType: document.getElementById('expSelect').value, data });
        if (res.status === 'success') showModal('完成', '數據已儲存。');
    });

    document.getElementById('calcBtn').addEventListener('click', calculateRatio);
    document.getElementById('loadBtn').addEventListener('click', () => executeLoad(false));
    document.getElementById('clearBtn').addEventListener('click', async () => {
        const res = await apiCall({ action: 'clear', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value, expType: document.getElementById('expSelect').value });
        if (res.status === 'success') { document.querySelectorAll('#table-container input').forEach(i => i.value = ''); showModal('清除成功', '紀錄已刪除。'); }
    });

    document.getElementById('expSelect').addEventListener('change', renderTable);
    const updateAll = () => { renderTable(); loadStudents(); closeGrading(); };
    document.getElementById('gradeSelect').addEventListener('change', updateAll);
    document.getElementById('classSelect').addEventListener('change', updateAll);
    
    document.getElementById('swapLayoutBtn').addEventListener('click', () => { 
        mainContainer.classList.toggle('md:flex-row'); mainContainer.classList.toggle('md:flex-row-reverse'); 
    });
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        } else {
            document.exitFullscreen();
        }
    });

    window.onload = () => { initCamera(); renderTable(); loadStudents(); updateLayout(); };
</script>
</body>
</html>
