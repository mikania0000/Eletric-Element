<!--
==========================================
實驗紀錄系統 - 前端網頁 (旗艦功能版)
版本：v2.1 (根據 Word 圖檔精確修正表格項目)
功能：
1. 實物投影機視訊 (支援全螢幕、左右互換、收納功能)
2. UI 彈性控制：字體大小、表格比例、首欄寬度
3. 實驗一至四表格完全對齊 Word 表格格式 (含填空結論區)
4. 計算公式：(V/I) * 1000
5. 課堂學生名單載入與即時加扣分系統
==========================================
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子電路實驗紀錄系統 v2.1</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .transition-layout { transition: all 0.3s ease-in-out; }
        
        :root {
            --table-width: 100%;
            --font-size: 14px;
            --col1-width: 120px; 
        }

        #table-container table { 
            width: var(--table-width); 
            font-size: var(--font-size); 
            margin: 0 auto; 
            table-layout: fixed;
        }

        /* 控制表格第一欄寬度 */
        #table-container th:first-child, 
        #table-container td:first-child { 
            width: var(--col1-width); 
            word-break: break-all;
            padding-left: 4px;
            padding-right: 4px;
        }
        
        .student-item:hover { background-color: #f9fafb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 表格內輸入框樣式優化 */
        .table-input {
            width: 100%;
            text-align: center;
            background-color: transparent;
            outline: none;
            border-bottom: 1px solid #e5e7eb;
        }
        .table-input:focus { border-bottom: 2px solid #3b82f6; }
        .fill-blank { border-bottom: 1px solid #4b5563; width: 60px; text-align: center; outline: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-layout">
    
    <!-- 視訊顯示區 -->
    <div id="videoContainer" class="relative bg-black flex flex-col items-center justify-center p-2 flex-1 h-full min-w-0 transition-layout">
        
        <!-- 左上角控制 -->
        <div class="absolute top-4 left-4 z-10 bg-white/90 p-2 rounded-lg shadow flex items-center gap-2">
            <select id="cameraSelect" class="border border-gray-300 rounded p-1 text-sm outline-none cursor-pointer max-w-[120px] md:max-w-xs"></select>
            <button id="refreshCamBtn" class="bg-blue-100 hover:bg-blue-200 p-1.5 rounded transition-colors" title="重新偵測攝影機">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="左右位置互換">
                <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
            </button>
        </div>
        
        <!-- 收納按鈕 -->
        <button id="toggleSidebarBtn" class="absolute top-4 right-4 z-30 bg-blue-600 text-white p-2.5 rounded-full shadow-2xl hover:bg-blue-700 transition-all transform hover:scale-110">
            <svg id="sidebar-icon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
            </svg>
        </button>

        <video id="video" class="w-full h-full object-contain bg-gray-900 rounded shadow-inner" autoplay playsinline></video>
    </div>

    <!-- 紀錄面板側邊欄 -->
    <div id="sidebar" class="w-full md:w-[450px] bg-white flex flex-col shadow-2xl z-20 h-1/2 md:h-full transition-layout overflow-hidden shrink-0">
        
        <div class="p-4 md:p-5 bg-blue-50 border-b border-blue-100 shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-bold text-blue-900 flex items-center">
                    實驗紀錄單
                </h1>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-blue-600 font-bold border bg-white px-1.5 py-0.5 rounded shadow-sm">v2.1</span>
                    <button id="fullscreenBtn" class="text-gray-400 hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="gradeSelect" class="border rounded p-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-300">
                    <option value="7">七年級</option><option value="8" selected>八年級</option><option value="9">九年級</option>
                </select>
                <select id="classSelect" class="border rounded p-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-300"></select>
            </div>
            
            <select id="expSelect" class="w-full border rounded p-1.5 font-bold text-blue-800 text-sm mb-3">
                <option value="exp1">1. 實驗一：固定電阻 (測量V-I關係)</option>
                <option value="exp2">2. 實驗二：電阻串聯</option>
                <option value="exp3">3. 實驗三：電阻並聯</option>
                <option value="exp4">4. 實驗四：並聯兩個電阻</option>
            </select>

            <!-- UI 調整滑桿 -->
            <div class="bg-white/50 p-2 rounded border border-blue-100 space-y-2">
                <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold">
                    <span class="w-16 shrink-0">文字：</span>
                    <input type="range" id="fontSlider" min="10" max="24" value="14" class="flex-1 h-1 bg-blue-200 rounded appearance-none cursor-pointer">
                    <span id="fontSizeDisplay" class="w-6 text-right">14</span>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold">
                    <span class="w-16 shrink-0">比例：</span>
                    <input type="range" id="widthSlider" min="50" max="150" value="100" class="flex-1 h-1 bg-blue-200 rounded appearance-none cursor-pointer">
                    <span id="widthDisplay" class="w-6 text-right">100</span>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold">
                    <span class="w-16 shrink-0">首欄：</span>
                    <input type="range" id="colWidthSlider" min="40" max="200" value="120" class="flex-1 h-1 bg-blue-200 rounded appearance-none cursor-pointer">
                    <span id="colWidthDisplay" class="w-6 text-right">120</span>
                </div>
            </div>
        </div>

        <!-- 表格內容區 -->
        <div class="flex-1 overflow-y-auto bg-gray-50 p-4 space-y-4 no-scrollbar">
            <div id="table-container" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 overflow-x-auto min-h-[100px]"></div>
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-100 px-4 py-2 border-b flex justify-between items-center text-sm font-bold">
                    <span>課堂加扣分名單</span>
                    <span id="studentCount" class="text-xs font-mono bg-gray-200 px-2 py-0.5 rounded text-gray-600">--</span>
                </div>
                <div id="student-list" class="divide-y divide-gray-100 max-h-[300px] overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <!-- 底部按鈕 -->
        <div class="p-4 bg-white border-t shrink-0 flex flex-col gap-2 shadow-inner">
            <button id="calcBtn" class="w-full bg-green-500 text-white font-bold py-2 rounded text-sm shadow hover:bg-green-600 transition-all active:scale-95 flex items-center justify-center">
                自動計算 (V/I) × 1000
            </button>
            <div class="flex gap-2">
                <button id="loadBtn" class="flex-1 bg-amber-500 text-white font-bold py-2 rounded text-xs shadow hover:bg-amber-600">提取紀錄</button>
                <button id="clearBtn" class="flex-1 bg-red-500 text-white font-bold py-2 rounded text-xs shadow hover:bg-red-600">清除紀錄</button>
                <button id="saveBtn" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded text-xs shadow hover:bg-blue-700">儲存數據</button>
            </div>
        </div>
    </div>
</div>

<div id="customModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 hidden p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 transform scale-95 transition-transform">
        <h3 id="modalTitle" class="text-lg font-bold mb-3 border-b pb-2">提示</h3>
        <p id="modalMessage" class="text-gray-600 mb-6 text-sm whitespace-pre-wrap"></p>
        <button id="modalCloseBtn" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow">確認</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzGj5KcJxD9iXeR5jiQEe_g9FhK5eYF3UFpyqPaQzxm5Fcns5-KdcOCGUYbbZw6AQ0g/exec'; 

    const classSelect = document.getElementById('classSelect');
    for (let i = 1; i <= 17; i++) {
        let val = i < 10 ? '0' + i : i;
        classSelect.innerHTML += `<option value="${val}">${val} 班</option>`;
    }

    const mainContainer = document.getElementById('mainContainer');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebarIcon = document.getElementById('sidebar-icon');
    let isSidebarOpen = true;

    function updateLayout() {
        if (!isSidebarOpen) {
            sidebar.style.width = '0px'; sidebar.style.minWidth = '0px'; sidebarIcon.style.transform = 'rotate(180deg)';
        } else {
            const isMobile = window.innerWidth < 768;
            sidebar.style.width = isMobile ? '100%' : '450px'; sidebar.style.minWidth = isMobile ? '100%' : '450px'; sidebarIcon.style.transform = 'rotate(0deg)';
        }
    }
    toggleSidebarBtn.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; updateLayout(); });
    window.addEventListener('resize', updateLayout);

    const sliders = {
        'fontSlider': { display: 'fontSizeDisplay', unit: 'px', var: '--font-size' },
        'widthSlider': { display: 'widthDisplay', unit: '%', var: '--table-width' },
        'colWidthSlider': { display: 'colWidthDisplay', unit: 'px', var: '--col1-width' }
    };
    Object.keys(sliders).forEach(id => {
        const slider = document.getElementById(id);
        slider.addEventListener('input', () => {
            document.getElementById(sliders[id].display).textContent = slider.value;
            document.documentElement.style.setProperty(sliders[id].var, slider.value + sliders[id].unit);
        });
    });

    function showModal(title, message) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        document.getElementById('customModal').classList.remove('hidden');
    }
    document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('customModal').classList.add('hidden'));

    const video = document.getElementById('video');
    const cameraSelect = document.getElementById('cameraSelect');
    async function initCamera() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';
            videoDevices.forEach((d, i) => cameraSelect.innerHTML += `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`);
            startStream();
        } catch (e) {}
    }
    async function startStream() {
        if (!cameraSelect.value) return;
        const s = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cameraSelect.value }, width: 1920, height: 1080 } });
        video.srcObject = s;
    }
    cameraSelect.addEventListener('change', startStream);
    document.getElementById('refreshCamBtn').addEventListener('click', initCamera);

    // --- 精確對齊圖檔表格 ---
    function renderTable() {
        const val = document.getElementById('expSelect').value;
        const container = document.getElementById('table-container');
        let html = '';
        
        if (val === 'exp1') {
            html = `
                <h3 class="font-bold text-center text-blue-900 mb-2 border-b">1. 固定電阻 (1000Ω 棕黑紅金)</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-blue-50 border">
                        <th class="border">電壓</th><th class="border">理論(Ω)</th><th class="border">電流(mA)</th><th class="border">比值(Ω)</th>
                    </tr></thead>
                    <tbody>
                        <tr><td class="border font-bold bg-gray-50">1.5V</td><td class="border"><input type="number" class="table-input" value="1000"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border font-bold bg-gray-50">3V</td><td class="border"><input type="number" class="table-input" value="1000"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                        <tr><td class="border font-bold bg-gray-50">4.5V</td><td class="border"><input type="number" class="table-input" value="1000"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r">-</td></tr>
                    </tbody>
                </table>
                <div class="mt-3 text-[var(--font-size)] space-y-1 text-gray-700">
                    <p>a. 電壓除以電流是否是一個定值？ <input type="text" class="fill-blank"> <br> 此值代表的意義是？ <input type="text" class="fill-blank w-2/3"></p>
                    <p>b. 電壓變 <input type="text" class="fill-blank w-12">，電流變 <input type="text" class="fill-blank w-12">，成 <input type="text" class="fill-blank w-12"> 比</p>
                </div>`;
        } else if (val === 'exp2' || val === 'exp3') {
            const sym = val === 'exp2' ? '+' : '//';
            const title = val === 'exp2' ? '實驗二：電阻串聯 (固定 3V)' : '實驗三：電阻並聯 (固定 3V)';
            html = `
                <h3 class="font-bold text-center text-blue-900 mb-2 border-b">${title}</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-blue-50 border text-[0.8em]">
                        <th class="border">電阻</th><th class="border">理論值(Ω)</th><th class="border">實測值(Ω)</th><th class="border">電壓(V)</th><th class="border">電流(mA)</th><th class="border">比值(Ω)</th>
                    </tr></thead>
                    <tbody>
                        <tr><td class="border text-left px-1">1個：<input type="text" class="w-10 fill-blank h-5"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r text-[0.8em]">-</td></tr>
                        <tr><td class="border text-left px-1">2個：<input type="text" class="w-8 fill-blank h-5">${sym}<input type="text" class="w-8 fill-blank h-5"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r text-[0.8em]">-</td></tr>
                        <tr><td class="border text-left px-1">3個：<input type="text" class="w-6 fill-blank h-5">${sym}<input type="text" class="w-6 fill-blank h-5">${sym}<input type="text" class="w-6 fill-blank h-5"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input input-v"></td><td class="border"><input type="number" class="table-input input-i"></td><td class="border font-bold result-r text-[0.8em]">-</td></tr>
                    </tbody>
                </table>
                <div class="mt-3 text-[var(--font-size)]">結論：<input type="text" class="fill-blank w-full"></div>`;
        } else if (val === 'exp4') {
            html = `
                <h3 class="font-bold text-center text-green-700 mb-2 border-b italic">4. 並聯兩個電阻，觀察每一個迴路的電壓及電流</h3>
                <table class="border-collapse text-center">
                    <thead><tr class="bg-green-50 border">
                        <th class="border">電阻</th><th class="border">理論值(Ω)</th><th class="border">實測值(Ω)</th><th class="border">電壓(V)</th><th class="border">電流(mA)</th>
                    </tr></thead>
                    <tbody>
                        <tr><td class="border font-bold bg-gray-50">迴路 1</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                        <tr><td class="border font-bold bg-gray-50">迴路 2</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                        <tr><td class="border font-bold bg-gray-50 italic">總</td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td><td class="border"><input type="number" class="table-input"></td></tr>
                    </tbody>
                </table>
                <div class="mt-4 text-[var(--font-size)] space-y-2 font-medium text-gray-800">
                    <p>A: 電阻比：迴路1:迴路2 = <input type="text" class="fill-blank w-12"> : <input type="text" class="fill-blank w-12"></p>
                    <p>B: 電流比：迴路1:迴路2 = <input type="text" class="fill-blank w-12"> : <input type="text" class="fill-blank w-12"></p>
                    <p>C: 結論：<input type="text" class="fill-blank w-full"></p>
                </div>`;
        }
        container.innerHTML = html;
        executeLoad(true);
    }

    function calculateRatio() {
        document.querySelectorAll('#table-container tr').forEach(row => {
            const vIn = row.querySelector('.input-v');
            const iIn = row.querySelector('.input-i');
            const v = vIn ? parseFloat(vIn.value) : parseFloat(row.cells[0]?.innerText.replace('V',''));
            const i = iIn ? parseFloat(iIn.value) : null;
            const res = row.querySelector('.result-r');
            if (res) res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-';
        });
    }

    async function apiCall(p) {
        try { const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(p) }); return await r.json(); }
        catch (e) { return { status: 'error' }; }
    }

    async function loadStudents() {
        const l = document.getElementById('student-list');
        l.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">載入中...</div>';
        const r = await apiCall({ action: 'getStudents', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value });
        if (r.status === 'success' && r.data.length > 0) {
            document.getElementById('studentCount').textContent = r.data.length + '人';
            l.innerHTML = '';
            r.data.forEach(s => {
                const d = document.createElement('div');
                d.className = "student-item flex items-center justify-between px-4 py-2 relative";
                d.innerHTML = `<span class="font-bold text-gray-800">${s.name}</span><div class="flex gap-2">
                    <button onclick="updateScore(${s.row}, -1, this)" class="w-8 h-8 rounded bg-red-100 text-red-600 font-bold">-1</button>
                    <button onclick="updateScore(${s.row}, 1, this)" class="w-8 h-8 rounded bg-green-100 text-green-600 font-bold">+1</button>
                </div>`;
                l.appendChild(d);
            });
        } else { l.innerHTML = '<div class="p-8 text-center text-gray-400">尚未建立名單資料</div>'; }
    }

    async function updateScore(row, delta, btn) {
        const t = btn.textContent; btn.disabled = true; btn.textContent = '...';
        const r = await apiCall({ action: 'updateScore', studentRow: row, delta });
        if (r.status === 'success') {
            const eff = document.createElement('div'); eff.textContent = delta > 0 ? '+1' : '-1';
            eff.className = `absolute right-12 top-2 font-black text-lg animate-bounce ${delta > 0 ? 'text-green-500' : 'text-red-500'}`;
            btn.parentElement.appendChild(eff); setTimeout(() => eff.remove(), 1000);
        }
        btn.disabled = false; btn.textContent = t;
    }

    async function executeLoad(isSilent) {
        const p = { action: 'load', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value, expType: document.getElementById('expSelect').value };
        const r = await apiCall(p);
        if (r.status === 'success') {
            const ins = document.querySelectorAll('#table-container input');
            ins.forEach((input, idx) => { if (r.data[idx] !== undefined) input.value = r.data[idx]; });
            calculateRatio();
        } else { document.querySelectorAll('#table-container input').forEach(input => input.value = ''); }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value);
        const res = await apiCall({ action: 'save', grade: document.getElementById('gradeSelect').value, className: document.getElementById('classSelect').value, expType: document.getElementById('expSelect').value, data });
        if (res.status === 'success') showModal('完成', '數據已儲存至雲端。');
    });

    document.getElementById('calcBtn').addEventListener('click', calculateRatio);
    document.getElementById('loadBtn').addEventListener('click', () => executeLoad(false));
    document.getElementById('expSelect').addEventListener('change', renderTable);
    const updateAll = () => { renderTable(); loadStudents(); };
    document.getElementById('gradeSelect').addEventListener('change', updateAll);
    document.getElementById('classSelect').addEventListener('change', updateAll);
    document.getElementById('swapLayoutBtn').addEventListener('click', () => { isLayoutSwapped = !isLayoutSwapped; mainContainer.classList.toggle('md:flex-row', !isLayoutSwapped); mainContainer.classList.toggle('md:flex-row-reverse', isLayoutSwapped); });

    window.onload = () => { initCamera(); renderTable(); loadStudents(); updateLayout(); };
</script>
</body>
