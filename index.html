<!--
==========================================
實驗紀錄系統 - 前端網頁 (完整功能版)
版本：v1.3 (搭配 GAS v1.3)
功能：
1. 實物投影機視訊整合 (支援全螢幕、左右互換)
2. 動態生成四個實驗單元表格 (實驗一至四)
3. 支援即時自動計算 V/I 比值
4. 與 GAS 串接，支援同班級讀取、覆蓋儲存、刪除清除
5. 全面使用 Tailwind 自訂 Modal 提示視窗
==========================================
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子電路實驗紀錄系統</title>
    <!-- 引入 Tailwind CSS 以實現精美的排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .modal-active {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-all duration-300">
    
    <!-- 視訊區 (預設左側 2/3) -->
    <div id="videoContainer" class="w-full md:w-2/3 bg-black relative flex flex-col items-center justify-center p-4 h-1/2 md:h-full">
        <!-- 攝影機選單懸浮於左上角 -->
        <div class="absolute top-4 left-4 z-10 bg-white/90 p-2 rounded-lg shadow flex items-center gap-2">
            <span class="text-sm font-bold text-gray-700 hidden sm:inline">視訊來源：</span>
            <select id="cameraSelect" class="border border-gray-300 rounded p-1 text-sm outline-none cursor-pointer max-w-[120px] md:max-w-xs"></select>
            <!-- 左右互換按鈕 -->
            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors flex items-center justify-center cursor-pointer" title="左右版面互換">
                <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
            </button>
        </div>
        
        <!-- 全螢幕按鈕懸浮於右上角 -->
        <button id="fullscreenBtn" class="absolute top-4 right-4 z-10 bg-white/90 p-2 rounded-lg shadow hover:bg-white transition-colors flex items-center justify-center cursor-pointer" title="切換全網頁全螢幕">
            <svg id="fs-enter-icon" class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            <svg id="fs-exit-icon" class="w-5 h-5 text-gray-700 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6l-7 7m17-11h-6m0 0V4m0 6l7-7M4 10h6m0 0V4m0 6l-7-7m17 11h-6m0 0v6m0-6l7 7"></path></svg>
        </button>

        <video id="video" class="w-full h-full object-contain border border-gray-800 rounded shadow-2xl bg-gray-900" autoplay playsinline></video>
    </div>

    <!-- 數據面板 (預設右側 1/3) -->
    <div class="w-full md:w-1/3 bg-white flex flex-col shadow-[-5px_0_15px_rgba(0,0,0,0.1)] z-20 h-1/2 md:h-full">
        
        <!-- 面板頭部：年級/班級/實驗選擇 -->
        <div class="p-4 md:p-5 bg-blue-50 border-b border-blue-100">
            <h1 class="text-xl font-bold text-blue-900 mb-3 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                實驗紀錄單 <span class="text-xs text-blue-600 font-normal ml-2 border border-blue-300 bg-blue-100 px-1.5 py-0.5 rounded shadow-sm">v1.3</span>
            </h1>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="flex items-center">
                    <label class="text-sm font-bold text-gray-700 mr-2 w-10">年級</label>
                    <select id="gradeSelect" class="flex-1 border rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-300">
                        <option value="7">七年級</option>
                        <option value="8" selected>八年級</option>
                        <option value="9">九年級</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <label class="text-sm font-bold text-gray-700 mr-2 w-10">班級</label>
                    <select id="classSelect" class="flex-1 border rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-300"></select>
                </div>
            </div>
            <div class="flex items-center">
                <label class="text-sm font-bold text-gray-700 mr-2 w-10">單元</label>
                <select id="expSelect" class="flex-1 border rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-300 font-bold text-blue-800 text-sm">
                    <option value="exp1">1. 實驗一：固定電阻 (測量V-I關係)</option>
                    <option value="exp2">2. 實驗二：電阻串聯</option>
                    <option value="exp3">3. 實驗三：電阻並聯</option>
                    <option value="exp4">4. 實驗四：並聯兩個電阻</option>
                </select>
            </div>
        </div>

        <!-- 面板中間：動態表格區 -->
        <div id="table-container" class="flex-1 overflow-y-auto p-4 md:p-5 bg-gray-50">
            <!-- 由 JS 動態生成 -->
        </div>

        <!-- 面板底部：按鈕區 -->
        <div class="p-4 bg-white border-t flex flex-col gap-3">
            <button id="calcBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded shadow transition-colors flex justify-center items-center">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                自動計算比值 (V/I)
            </button>
            <div class="flex gap-2">
                <button id="loadBtn" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded shadow transition-colors text-xs sm:text-sm">
                    提取紀錄
                </button>
                <button id="clearBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 rounded shadow transition-colors text-xs sm:text-sm">
                    清除紀錄
                </button>
                <button id="saveBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded shadow transition-colors text-xs sm:text-sm">
                    儲存數據
                </button>
            </div>
        </div>
        
    </div>
</div>

<!-- 自訂彈出視窗 (Modal) -->
<div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
    <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-md p-6">
        <h3 id="modalTitle" class="text-xl font-bold mb-3">提示</h3>
        <p id="modalMessage" class="text-gray-600 mb-6 whitespace-pre-line"></p>
        <div class="flex justify-end">
            <button id="modalCloseBtn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded shadow hover:bg-blue-700 transition-colors">
                確認
            </button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzGj5KcJxD9iXeR5jiQEe_g9FhK5eYF3UFpyqPaQzxm5Fcns5-KdcOCGUYbbZw6AQ0g/exec'; 

    // --- 初始化 UI ---
    const classSelect = document.getElementById('classSelect');
    for (let i = 1; i <= 17; i++) {
        let val = i < 10 ? '0' + i : i;
        classSelect.innerHTML += `<option value="${val}">${val} 班</option>`;
    }

    const customModal = document.getElementById('customModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function showModal(title, message, type = 'info') {
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modalTitle.className = 'text-xl font-bold mb-3';
        if (type === 'error') modalTitle.classList.add('text-red-600');
        else if (type === 'success') modalTitle.classList.add('text-green-600');
        else if (type === 'warning') modalTitle.classList.add('text-amber-600');
        else modalTitle.classList.add('text-blue-600');
        customModal.classList.remove('hidden');
    }

    modalCloseBtn.addEventListener('click', () => customModal.classList.add('hidden'));

    // --- 左右版面互換 ---
    const swapLayoutBtn = document.getElementById('swapLayoutBtn');
    const mainContainer = document.getElementById('mainContainer');
    let isLayoutSwapped = false;
    swapLayoutBtn.addEventListener('click', () => {
        isLayoutSwapped = !isLayoutSwapped;
        mainContainer.classList.toggle('md:flex-row', !isLayoutSwapped);
        mainContainer.classList.toggle('md:flex-row-reverse', isLayoutSwapped);
    });

    // --- 全螢幕控制 ---
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsEnterIcon = document.getElementById('fs-enter-icon');
    const fsExitIcon = document.getElementById('fs-exit-icon');
    fullscreenBtn.addEventListener('click', () => {
        const doc = document.documentElement;
        if (!document.fullscreenElement) {
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    });
    document.addEventListener('fullscreenchange', () => {
        const isFS = !!document.fullscreenElement;
        fsEnterIcon.classList.toggle('hidden', isFS);
        fsExitIcon.classList.toggle('hidden', !isFS);
    });

    // --- 攝影機控制 ---
    const video = document.getElementById('video');
    const cameraSelect = document.getElementById('cameraSelect');
    async function initCamera() {
        try {
            let initialStream;
            try { initialStream = await navigator.mediaDevices.getUserMedia({ video: true }); } catch (e) {}
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';
            if (videoDevices.length === 0) {
                cameraSelect.innerHTML = '<option value="">找不到攝影機</option>';
            } else {
                videoDevices.forEach((device, index) => {
                    const opt = document.createElement('option');
                    opt.value = device.deviceId;
                    opt.text = device.label || `鏡頭 ${index + 1}`;
                    cameraSelect.appendChild(opt);
                });
            }
            if (initialStream) initialStream.getTracks().forEach(t => t.stop());
            await startStream();
        } catch (err) {
            cameraSelect.innerHTML = '<option value="">初始化攝影機失敗</option>';
        }
    }

    async function startStream() {
        if (!cameraSelect.value) return;
        if (window.stream) window.stream.getTracks().forEach(t => t.stop());
        try {
            window.stream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: { exact: cameraSelect.value }, width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = window.stream;
        } catch (e) {
            window.stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = window.stream;
        }
    }
    cameraSelect.addEventListener('change', startStream);

    // --- 表格渲染 ---
    const tableContainer = document.getElementById('table-container');
    const expSelect = document.getElementById('expSelect');
    const gradeSelect = document.getElementById('gradeSelect');

    function renderTable() {
        const val = expSelect.value;
        let html = '';
        if (val === 'exp1') {
            html = `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                    <h3 class="font-bold text-lg mb-2 text-blue-800 border-b-2 border-blue-100 pb-2">1. 實驗一：固定電阻 (1000Ω棕黑紅金)</h3>
                    <table class="w-full text-center border-collapse text-sm mb-4">
                        <thead><tr class="bg-blue-50 text-blue-900"><th class="border p-2">電壓(V)</th><th class="border p-2">電流(mA)</th><th class="border p-2">比值(V/I)</th></tr></thead>
                        <tbody>
                            <tr><td class="border p-2 bg-gray-50"><input type="number" class="w-full text-center bg-transparent input-v" value="1.5" readonly></td><td class="border p-2"><input type="number" class="w-full text-center bg-yellow-50 p-1 input-i"></td><td class="border p-2 font-bold text-blue-600 result-r bg-gray-50">-</td></tr>
                            <tr><td class="border p-2 bg-gray-50"><input type="number" class="w-full text-center bg-transparent input-v" value="3.0" readonly></td><td class="border p-2"><input type="number" class="w-full text-center bg-yellow-50 p-1 input-i"></td><td class="border p-2 font-bold text-blue-600 result-r bg-gray-50">-</td></tr>
                            <tr><td class="border p-2 bg-gray-50"><input type="number" class="w-full text-center bg-transparent input-v" value="4.5" readonly></td><td class="border p-2"><input type="number" class="w-full text-center bg-yellow-50 p-1 input-i"></td><td class="border p-2 font-bold text-blue-600 result-r bg-gray-50">-</td></tr>
                        </tbody>
                    </table>
                    <div class="text-sm flex flex-col gap-2 text-gray-700">
                        <div>a. 電壓除以電流是否是一個定值？ <input type="text" class="border-b border-gray-400 w-16 text-center"> 此值代表的意義是？<input type="text" class="border-b border-gray-400 w-24"></div>
                        <div>b. 電壓變 <input type="text" class="border-b border-gray-400 w-10 text-center"> ，電流變 <input type="text" class="border-b border-gray-400 w-10 text-center"> ，成 <input type="text" class="border-b border-gray-400 w-10 text-center"> 比</div>
                    </div>
                </div>`;
        } else if (val === 'exp2' || val === 'exp3') {
            const title = val === 'exp2' ? '實驗二：電阻串聯' : '實驗三：電阻並聯';
            html = `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                    <h3 class="font-bold text-lg mb-3 text-blue-800 border-b-2 border-blue-100 pb-2">${title}</h3>
                    <table class="w-full text-center border-collapse text-xs mb-4">
                        <thead><tr class="bg-blue-50 text-blue-900"><th class="border p-1">電阻</th><th class="border p-1">總阻值(Ω)</th><th class="border p-1">電壓(V)</th><th class="border p-1">電流(mA)</th><th class="border p-1">比值(V/I)</th></tr></thead>
                        <tbody>
                            <tr><td class="border p-1 text-left">1個:<input type="text" class="w-8 border-b"></td><td class="border p-1"><input type="number" class="w-full text-center"></td><td class="border p-1"><input type="number" class="w-full text-center input-v"></td><td class="border p-1"><input type="number" class="w-full text-center input-i"></td><td class="border p-1 font-bold result-r">-</td></tr>
                            <tr><td class="border p-1 text-left">2個:<input type="text" class="w-8 border-b"></td><td class="border p-1"><input type="number" class="w-full text-center"></td><td class="border p-1"><input type="number" class="w-full text-center input-v"></td><td class="border p-1"><input type="number" class="w-full text-center input-i"></td><td class="border p-1 font-bold result-r">-</td></tr>
                            <tr><td class="border p-1 text-left">3個:<input type="text" class="w-8 border-b"></td><td class="border p-1"><input type="number" class="w-full text-center"></td><td class="border p-1"><input type="number" class="w-full text-center input-v"></td><td class="border p-1"><input type="number" class="w-full text-center input-i"></td><td class="border p-1 font-bold result-r">-</td></tr>
                        </tbody>
                    </table>
                    <div class="text-sm">結論：<input type="text" class="w-full border-b border-gray-400 mt-1"></div>
                </div>`;
        } else if (val === 'exp4') {
            html = `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                    <h3 class="font-bold text-md mb-3 text-green-700 border-b-2 border-green-100 pb-2">4. 實驗四：並聯兩個電阻，觀察迴路</h3>
                    <table class="w-full text-center border-collapse text-sm mb-4">
                        <thead><tr class="bg-green-50 text-green-900"><th class="border p-2">電阻</th><th class="border p-2">電阻(Ω)</th><th class="border p-2">電壓(V)</th><th class="border p-2">電流(mA)</th></tr></thead>
                        <tbody>
                            <tr><td class="border p-2">迴路 1</td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td></tr>
                            <tr><td class="border p-2">迴路 2</td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td></tr>
                            <tr><td class="border p-2 font-bold">總</td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td><td class="border p-2"><input type="number" class="w-full"></td></tr>
                        </tbody>
                    </table>
                    <div class="text-sm flex flex-col gap-2">
                        <div>電阻比: <input type="text" class="border-b w-10 text-center">:<input type="text" class="border-b w-10 text-center"></div>
                        <div>電流比: <input type="text" class="border-b w-10 text-center">:<input type="text" class="border-b w-10 text-center"></div>
                        <div>結論：<input type="text" class="w-full border-b"></div>
                    </div>
                </div>`;
        }
        tableContainer.innerHTML = html;
    }

    // --- 數據通訊 ---
    async function apiCall(payload) {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            return await res.json();
        } catch (e) {
            console.error(e);
            return { status: 'error', message: '連線異常，請確認 GAS 網址與部署權限' };
        }
    }

    function getTableData() {
        return Array.from(tableContainer.querySelectorAll('input')).map(input => input.value);
    }

    function setTableData(dataArray) {
        const inputs = tableContainer.querySelectorAll('input');
        inputs.forEach((input, i) => { if (dataArray[i] !== undefined && !input.readOnly) input.value = dataArray[i]; });
        calculateRatio();
    }

    function clearTableData() {
        tableContainer.querySelectorAll('input').forEach(input => { if (!input.readOnly) input.value = ''; });
        tableContainer.querySelectorAll('.result-r').forEach(el => el.textContent = '-');
    }

    async function executeLoad(isSilent = false) {
        const payload = { action: 'load', grade: gradeSelect.value, className: classSelect.value, expType: expSelect.value };
        const res = await apiCall(payload);
        if (res.status === 'success') {
            setTableData(res.data);
            if (!isSilent) showModal('讀取成功', '✅ 資料已成功載入', 'success');
        } else {
            clearTableData();
            if (!isSilent && res.status === 'empty') showModal('提示', 'ℹ️ 無存檔紀錄', 'info');
            else if (!isSilent) showModal('錯誤', res.message, 'error');
        }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const payload = { action: 'save', grade: gradeSelect.value, className: classSelect.value, expType: expSelect.value, data: getTableData() };
        const res = await apiCall(payload);
        if (res.status === 'success') showModal('儲存成功', '✅ 資料已儲存並同步至 Google 試算表', 'success');
        else showModal('錯誤', res.message, 'error');
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
        const payload = { action: 'clear', grade: gradeSelect.value, className: classSelect.value, expType: expSelect.value };
        const res = await apiCall(payload);
        if (res.status === 'success') {
            clearTableData();
            showModal('清除成功', '✅ 雲端紀錄已刪除，表格已清空', 'success');
        } else if (res.status === 'empty') {
            showModal('提示', 'ℹ️ 雲端查無此紀錄，僅清空表格', 'info');
            clearTableData();
        } else {
            showModal('錯誤', res.message, 'error');
        }
    });

    function calculateRatio() {
        document.querySelectorAll('#table-container tr').forEach(row => {
            const v = parseFloat(row.querySelector('.input-v')?.value);
            const i = parseFloat(row.querySelector('.input-i')?.value);
            const r = row.querySelector('.result-r');
            if (r) r.textContent = (v && i) ? (v / i).toFixed(2) : '-';
        });
    }

    document.getElementById('calcBtn').addEventListener('click', calculateRatio);
    document.getElementById('loadBtn').addEventListener('click', () => executeLoad(false));
    expSelect.addEventListener('change', () => { renderTable(); executeLoad(true); });
    gradeSelect.addEventListener('change', () => executeLoad(true));
    classSelect.addEventListener('change', () => executeLoad(true));

    initCamera();
    renderTable();
    setTimeout(() => executeLoad(true), 500);

</script>
</body>
</html>
